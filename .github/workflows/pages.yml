# Публикация готовых выпусков «СПЕКТР» на GitHub Pages.
# Сборки здесь нет: выпуски собираются локально (builder/build.sh) и коммитятся
# в dist/. Этот workflow только выкладывает содержимое dist/ как статический сайт.
# Корень сайта = dist/: dist/index.html → /, dist/01/index.html → /01/ и т.д.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "dist/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

# Права, нужные действиям публикации Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Не запускать параллельные публикации; новый пуш отменяет предыдущий прогон.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Ждать подтверждения публикации до 30 мин: очередь бэкенда Pages
          # бывает медленной, и при дефолтных 10 мин шаг падал по таймауту,
          # хотя сайт при этом успешно обновлялся.
          timeout: 1800000
